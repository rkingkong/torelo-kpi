<!DOCTYPE html>
<html>
<head>
    <title>Test Attendance Data</title>
</head>
<body>
    <h1>Testing Attendance Data Load</h1>
    <div id="result">Loading...</div>
    <script>
        fetch('comprehensive_attendance.json')
            .then(response => response.json())
            .then(data => {
                document.getElementById('result').innerHTML = `
                    <h2>✅ Data Loaded Successfully!</h2>
                    <p>Total Employees: ${data.all_employees.length}</p>
                    <p>Days with data: ${Object.keys(data.attendance_by_date).length}</p>
                    <p>Generated at: ${data.generated_at}</p>
                    <h3>Today's Attendance:</h3>
                    <pre>${JSON.stringify(data.attendance_by_date[Object.keys(data.attendance_by_date)[0]], null, 2)}</pre>
                `;
            })
            .catch(error => {
                document.getElementById('result').innerHTML = `
                    <h2>❌ Error loading data</h2>
                    <p>${error}</p>
                `;
            });
    </script>
</body>
</html>
