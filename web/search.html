<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Torelo Search - Búsqueda Inteligente</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: linear-gradient(135deg, #7c3aed 0%, #5b21b6 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        
        .header {
            text-align: center;
            color: white;
            margin-bottom: 40px;
        }
        
        .header h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
        }
        
        .search-box {
            background: white;
            border-radius: 16px;
            padding: 30px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            margin-bottom: 30px;
        }
        
        .search-form {
            display: flex;
            gap: 10px;
        }
        
        .search-input {
            flex: 1;
            padding: 15px 20px;
            font-size: 16px;
            border: 2px solid #e5e7eb;
            border-radius: 12px;
            outline: none;
            transition: all 0.3s;
        }
        
        .search-input:focus {
            border-color: #7c3aed;
            box-shadow: 0 0 0 3px rgba(124, 58, 237, 0.1);
        }
        
        .search-button {
            padding: 15px 30px;
            background: #7c3aed;
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .search-button:hover {
            background: #6d28d9;
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(124, 58, 237, 0.3);
        }
        
        .search-button:disabled {
            background: #9ca3af;
            cursor: not-allowed;
            transform: none;
        }
        
        /* Search Stats */
        .search-stats {
            text-align: center;
            color: white;
            margin-bottom: 20px;
            font-size: 1.1rem;
        }
        
        .search-stats strong {
            font-weight: 600;
            color: #fbbf24;
        }
        
        /* Results Container */
        .results {
            display: grid;
            gap: 16px;
        }
        
        /* Result Card */
        .result-card {
            background: white;
            border-radius: 12px;
            padding: 24px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            cursor: pointer;
            transition: all 0.2s;
            border: 2px solid transparent;
            position: relative;
            overflow: hidden;
        }
        
        .result-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(0,0,0,0.12);
            border-color: #7c3aed;
        }
        
        /* High relevance indicator */
        .result-card.high-relevance {
            border-left: 4px solid #10b981;
        }
        
        .result-card.medium-relevance {
            border-left: 4px solid #f59e0b;
        }
        
        .result-card.low-relevance {
            border-left: 4px solid #6b7280;
        }
        
        /* Result Header */
        .result-header {
            display: flex;
            align-items: flex-start;
            gap: 16px;
            margin-bottom: 12px;
        }
        
        .file-icon {
            font-size: 24px;
            width: 48px;
            height: 48px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #f3f4f6;
            border-radius: 8px;
            flex-shrink: 0;
        }
        
        .file-icon.xlsx { background: #e8f5e9; }
        .file-icon.pdf { background: #ffebee; }
        .file-icon.docx { background: #e3f2fd; }
        .file-icon.folder { background: #fff3e0; }
        
        .result-info {
            flex: 1;
            min-width: 0;
        }
        
        .result-name {
            font-size: 18px;
            font-weight: 600;
            color: #1f2937;
            margin-bottom: 8px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        
        /* Metadata Pills */
        .result-meta {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            margin-bottom: 12px;
        }
        
        .meta-pill {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 4px 12px;
            background: #f3f4f6;
            border-radius: 20px;
            font-size: 13px;
            color: #6b7280;
        }
        
        .meta-pill.type-xlsx { background: #e8f5e9; color: #2e7d32; }
        .meta-pill.type-pdf { background: #ffebee; color: #c62828; }
        .meta-pill.type-docx { background: #e3f2fd; color: #1565c0; }
        .meta-pill.type-folder { background: #fff3e0; color: #ef6c00; }
        
        /* Relevance Badge */
        .relevance-badge {
            position: absolute;
            top: 16px;
            right: 16px;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 600;
        }
        
        .relevance-badge.high {
            background: #d1fae5;
            color: #065f46;
        }
        
        .relevance-badge.medium {
            background: #fed7aa;
            color: #92400e;
        }
        
        .relevance-badge.low {
            background: #e5e7eb;
            color: #374151;
        }
        
        /* Summary Section */
        .result-summary {
            font-size: 14px;
            color: #4b5563;
            line-height: 1.6;
            margin-bottom: 12px;
        }
        
        .result-summary mark {
            background: #fef3c7;
            padding: 1px 3px;
            border-radius: 2px;
        }
        
        /* Verification Info */
        .verification-info {
            margin-top: 12px;
            padding-top: 12px;
            border-top: 1px solid #e5e7eb;
            font-size: 12px;
            color: #6b7280;
        }
        
        .verification-item {
            display: flex;
            align-items: center;
            gap: 6px;
            margin-bottom: 4px;
        }
        
        .verification-item .icon {
            color: #10b981;
        }
        
        /* Category Tags */
        .category-tag {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        .category-inventory { background: #d1fae5; color: #065f46; }
        .category-material { background: #ddd6fe; color: #5b21b6; }
        .category-steel { background: #fed7aa; color: #92400e; }
        .category-other { background: #e5e7eb; color: #374151; }
        
        /* Loading State */
        .loading {
            text-align: center;
            padding: 60px;
            color: white;
        }
        
        .loading-spinner {
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top: 3px solid white;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        /* No Results */
        .no-results {
            text-align: center;
            padding: 80px 20px;
            color: white;
        }
        
        .no-results-icon {
            font-size: 64px;
            margin-bottom: 20px;
            opacity: 0.5;
        }
        
        /* Error Message */
        .error-message {
            background: #fef2f2;
            color: #991b1b;
            padding: 16px 20px;
            border-radius: 8px;
            margin-bottom: 20px;
            border-left: 4px solid #dc2626;
        }
        
        /* Action Button */
        .action-button {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 8px 16px;
            background: #7c3aed;
            color: white;
            border-radius: 6px;
            font-size: 14px;
            text-decoration: none;
            transition: all 0.2s;
        }
        
        .action-button:hover {
            background: #6d28d9;
            transform: translateY(-1px);
        }
        
        /* Language Toggle */
        .language-toggle {
            position: fixed;
            top: 20px;
            right: 20px;
            display: flex;
            gap: 8px;
            background: rgba(255, 255, 255, 0.2);
            padding: 4px;
            border-radius: 8px;
        }
        
        .lang-btn {
            padding: 8px 16px;
            background: transparent;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .lang-btn.active {
            background: white;
            color: #7c3aed;
        }
        
        /* Responsive */
        @media (max-width: 768px) {
            .header h1 {
                font-size: 1.8rem;
            }
            
            .search-form {
                flex-direction: column;
            }
            
            .result-header {
                flex-direction: column;
                text-align: center;
            }
            
            .relevance-badge {
                position: static;
                display: inline-block;
                margin-top: 8px;
            }
        }
    </style>
</head>
<body>
    <div class="language-toggle">
        <button class="lang-btn active" onclick="setLanguage('es')">ES</button>
        <button class="lang-btn" onclick="setLanguage('en')">EN</button>
    </div>
    
    <div class="container">
        <a href="/" class="action-button" style="margin-bottom: 20px; display: inline-flex;">
            ← <span data-lang="back">Volver al Dashboard</span>
        </a>
        
        <div class="header">
            <h1>🔍 <span data-lang="title">Búsqueda Inteligente de Documentos</span></h1>
            <p data-lang="subtitle">Busca en todos los documentos de SharePoint con IA</p>
        </div>
        
        <div class="search-box">
            <form id="searchForm" class="search-form">
                <input 
                    type="text" 
                    id="searchInput" 
                    class="search-input" 
                    placeholder="Buscar archivos... (ej: reporte de inventario, material movement)"
                    data-lang-placeholder="search-placeholder"
                    autofocus
                >
                <button type="submit" class="search-button" id="searchButton">
                    <span data-lang="search">Buscar</span>
                </button>
            </form>
        </div>
        
        <div id="searchStats" class="search-stats" style="display: none;">
            <span data-lang="found">Encontrados</span> 
            <strong id="resultsCount">0</strong> 
            <span data-lang="results">resultados de</span> 
            <strong id="totalCount">0</strong> 
            <span data-lang="total">coincidencias totales</span>
        </div>
        
        <div id="loadingDiv" class="loading" style="display: none;">
            <div class="loading-spinner"></div>
            <p data-lang="searching">Buscando documentos con IA...</p>
        </div>
        
        <div id="errorDiv" class="error-message" style="display: none;"></div>
        
        <div id="resultsDiv" class="results"></div>
        
        <div id="noResultsDiv" class="no-results" style="display: none;">
            <div class="no-results-icon">📭</div>
            <h3 data-lang="no-results">No se encontraron resultados</h3>
            <p data-lang="try-different">Intenta con otros términos de búsqueda</p>
        </div>
    </div>

    <script>
        // Configuration
        const WEBHOOK_URL = 'https://n8n.torelo.net/webhook/smart-search';
        let currentLang = 'es';
        
        // Translations
        const translations = {
            es: {
                'back': 'Volver al Dashboard',
                'title': 'Búsqueda Inteligente de Documentos',
                'subtitle': 'Busca en todos los documentos de SharePoint con IA',
                'search': 'Buscar',
                'search-placeholder': 'Buscar archivos... (ej: reporte de inventario, material movement)',
                'searching': 'Buscando documentos con IA...',
                'found': 'Encontrados',
                'results': 'resultados de',
                'total': 'coincidencias totales',
                'no-results': 'No se encontraron resultados',
                'try-different': 'Intenta con otros términos de búsqueda',
                'relevance': 'Relevancia',
                'verified': 'Verificado',
                'category': 'Categoría',
                'modified': 'Modificado',
                'size': 'Tamaño',
                'open': 'Abrir documento',
                'analyze': 'Analizar contenido',
                'high-relevance': 'Alta relevancia',
                'medium-relevance': 'Relevancia media',
                'low-relevance': 'Baja relevancia'
            },
            en: {
                'back': 'Back to Dashboard',
                'title': 'Intelligent Document Search',
                'subtitle': 'Search all SharePoint documents with AI',
                'search': 'Search',
                'search-placeholder': 'Search files... (e.g: inventory report, material movement)',
                'searching': 'Searching documents with AI...',
                'found': 'Found',
                'results': 'results out of',
                'total': 'total matches',
                'no-results': 'No results found',
                'try-different': 'Try different search terms',
                'relevance': 'Relevance',
                'verified': 'Verified',
                'category': 'Category',
                'modified': 'Modified',
                'size': 'Size',
                'open': 'Open document',
                'analyze': 'Analyze content',
                'high-relevance': 'High relevance',
                'medium-relevance': 'Medium relevance',
                'low-relevance': 'Low relevance'
            }
        };
        
        // File icons
        const fileIcons = {
            'xlsx': '📊',
            'xls': '📊',
            'doc': '📄',
            'docx': '📄',
            'pdf': '📕',
            'ppt': '📊',
            'pptx': '📊',
            'py': '🐍',
            'folder': '📁',
            'log': '📋',
            'json': '🔧',
            'default': '📄'
        };
        
        // Category names
        const categoryNames = {
            'inventory_reports': { es: 'Reportes de Inventario', en: 'Inventory Reports' },
            'material_movement': { es: 'Movimiento de Materiales', en: 'Material Movement' },
            'material_optimization': { es: 'Optimización de Materiales', en: 'Material Optimization' },
            'steel_reports': { es: 'Reportes de Acero', en: 'Steel Reports' },
            'other': { es: 'Otros Documentos', en: 'Other Documents' }
        };
        
        function setLanguage(lang) {
            currentLang = lang;
            document.querySelectorAll('.lang-btn').forEach(btn => {
                btn.classList.toggle('active', btn.textContent.toLowerCase() === lang);
            });
            updateTranslations();
        }
        
        function updateTranslations() {
            document.querySelectorAll('[data-lang]').forEach(el => {
                const key = el.getAttribute('data-lang');
                if (translations[currentLang][key]) {
                    el.textContent = translations[currentLang][key];
                }
            });
            
            document.querySelectorAll('[data-lang-placeholder]').forEach(el => {
                const key = el.getAttribute('data-lang-placeholder');
                if (translations[currentLang][key]) {
                    el.placeholder = translations[currentLang][key];
                }
            });
        }
        
        function getFileIcon(type) {
            return fileIcons[type] || fileIcons.default;
        }
        
        function formatFileSize(size) {
            if (!size || size === 'N/A') return 'N/A';
            if (size < 1024) return size + ' B';
            if (size < 1048576) return (size / 1024).toFixed(1) + ' KB';
            return (size / 1048576).toFixed(1) + ' MB';
        }
        
        function formatDate(dateStr) {
            if (!dateStr) return 'N/A';
            try {
                const date = new Date(dateStr);
                const options = { year: 'numeric', month: 'short', day: 'numeric' };
                return date.toLocaleDateString(currentLang === 'es' ? 'es-ES' : 'en-US', options);
            } catch {
                return dateStr;
            }
        }
        
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        function getRelevanceClass(score) {
            if (score > 80) return 'high';
            if (score > 50) return 'medium';
            return 'low';
        }
        
        function highlightKeywords(text, keywords) {
            let highlighted = text;
            keywords.forEach(keyword => {
                const regex = new RegExp(`(${keyword})`, 'gi');
                highlighted = highlighted.replace(regex, '<mark>$1</mark>');
            });
            return highlighted;
        }
        
        function displayResults(data) {
            const resultsDiv = document.getElementById('resultsDiv');
            const noResultsDiv = document.getElementById('noResultsDiv');
            const searchStats = document.getElementById('searchStats');
            
            resultsDiv.innerHTML = '';
            
            if (!data.files || data.files.length === 0) {
                noResultsDiv.style.display = 'block';
                searchStats.style.display = 'none';
                return;
            }
            
            noResultsDiv.style.display = 'none';
            searchStats.style.display = 'block';
            
            // Update stats
            document.getElementById('resultsCount').textContent = data.files.length;
            document.getElementById('totalCount').textContent = data.totalResults || data.files.length;
            
            // Show AI summary if available
            if (data.aiSummary) {
                const summaryDiv = document.createElement('div');
                summaryDiv.className = 'result-card';
                summaryDiv.style.background = 'linear-gradient(135deg, #f3e8ff 0%, #e9d5ff 100%)';
                summaryDiv.style.border = '2px solid #9333ea';
                summaryDiv.innerHTML = `
                    <div class="result-header">
                        <div class="file-icon" style="background: #e9d5ff;">🤖</div>
                        <div class="result-info">
                            <div class="result-name">AI ${translations[currentLang]['relevance']} Analysis</div>
                            <div class="result-summary">${escapeHtml(data.aiSummary)}</div>
                        </div>
                    </div>
                `;
                resultsDiv.appendChild(summaryDiv);
            }
            
            // Display each file
            data.files.forEach((file, index) => {
                const card = document.createElement('div');
                const relevanceClass = getRelevanceClass(file.aiRelevanceScore || file.score || 0);
                card.className = `result-card ${relevanceClass}-relevance`;
                
                // Build verification info HTML
                let verificationHtml = '';
                if (file.verificationNotes && file.verificationNotes.length > 0) {
                    verificationHtml = `
                        <div class="verification-info">
                            ${file.verificationNotes.map(note => `
                                <div class="verification-item">
                                    <span class="icon">✓</span>
                                    <span>${note}</span>
                                </div>
                            `).join('')}
                        </div>
                    `;
                }
                
                // Build category tag
                const categoryKey = file.category || 'other';
                const categoryName = categoryNames[categoryKey] ? 
                    categoryNames[categoryKey][currentLang] : 
                    categoryKey;
                
                // Highlight summary if keywords present
                let summaryHtml = '';
                if (file.summary) {
                    const keywords = data.keywords || [];
                    const highlightedSummary = highlightKeywords(
                        file.summary.substring(0, 200) + (file.summary.length > 200 ? '...' : ''),
                        keywords
                    );
                    summaryHtml = `<div class="result-summary">${highlightedSummary}</div>`;
                }
                
                card.innerHTML = `
                    <div class="relevance-badge ${relevanceClass}">
                        ${translations[currentLang][relevanceClass + '-relevance']}
                    </div>
                    
                    <div class="result-header">
                        <div class="file-icon ${file.type}">${getFileIcon(file.type)}</div>
                        <div class="result-info">
                            <div class="result-name" title="${escapeHtml(file.name)}">${escapeHtml(file.name)}</div>
                            <div class="result-meta">
                                <span class="meta-pill type-${file.type}">
                                    ${file.type.toUpperCase()}
                                </span>
                                <span class="meta-pill">
                                    📅 ${formatDate(file.modified)}
                                </span>
                                <span class="meta-pill">
                                    💾 ${formatFileSize(file.size)}
                                </span>
                                <span class="category-tag category-${categoryKey.replace(/_/g, '-')}">
                                    ${categoryName}
                                </span>
                            </div>
                        </div>
                    </div>
                    
                    ${summaryHtml}
                    
                    ${file.relevanceExplanation ? `
                        <div style="font-size: 13px; color: #6b7280; margin-top: 8px;">
                            💡 ${escapeHtml(file.relevanceExplanation)}
                        </div>
                    ` : ''}
                    
                    ${verificationHtml}
                    
                    <div style="margin-top: 16px; display: flex; gap: 12px;">
                        <a href="${file.url}" target="_blank" class="action-button" onclick="event.stopPropagation();">
                            📄 ${translations[currentLang]['open']}
                        </a>
                        ${index < 3 ? `
                            <button class="action-button" onclick="analyzeDocument('${file.id}', '${file.name}'); event.stopPropagation();" style="background: #8b5cf6;">
                                🔍 ${translations[currentLang]['analyze']}
                            </button>
                        ` : ''}
                    </div>
                `;
                
                // Click handler for the whole card
                card.onclick = (e) => {
                    if (!e.target.closest('a') && !e.target.closest('button')) {
                        window.open(file.url, '_blank');
                    }
                };
                
                resultsDiv.appendChild(card);
            });
        }
        
        async function performSearch(query) {
            const loadingDiv = document.getElementById('loadingDiv');
            const errorDiv = document.getElementById('errorDiv');
            const resultsDiv = document.getElementById('resultsDiv');
            const noResultsDiv = document.getElementById('noResultsDiv');
            const searchButton = document.getElementById('searchButton');
            const searchStats = document.getElementById('searchStats');
            
            // Reset UI
            loadingDiv.style.display = 'block';
            errorDiv.style.display = 'none';
            resultsDiv.innerHTML = '';
            noResultsDiv.style.display = 'none';
            searchStats.style.display = 'none';
            searchButton.disabled = true;
            
            try {
                const response = await fetch(WEBHOOK_URL, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        message: query,
                        language: currentLang,
                        timestamp: new Date().toISOString(),
                        user: 'web-search'
                    })
                });
                
                if (!response.ok) {
                    throw new Error(`Error: ${response.status}`);
                }
                
                const data = await response.json();
                console.log('Search results:', data);
                
                displayResults(data);
                
            } catch (error) {
                console.error('Search error:', error);
                errorDiv.textContent = currentLang === 'es' ? 
                    'Error al buscar. Por favor intenta de nuevo.' : 
                    'Search error. Please try again.';
                errorDiv.style.display = 'block';
            } finally {
                loadingDiv.style.display = 'none';
                searchButton.disabled = false;
            }
        }
        
        async function analyzeDocument(documentId, documentName) {
            console.log('Analyzing document:', documentId, documentName);
            
            // Prevent any issues with the button event
            event.preventDefault();
            event.stopPropagation();
            
            if (!confirm(`${currentLang === 'es' ? '¿Analizar el contenido de' : 'Analyze content of'} "${documentName}"?`)) {
                return;
            }
            
            // Find the button that was clicked
            const button = event.target.closest('button');
            const originalText = button.textContent;
            button.disabled = true;
            button.textContent = currentLang === 'es' ? '⏳ Analizando...' : '⏳ Analyzing...';
            
            try {
                console.log('Sending request to webhook...');
                
                const response = await fetch('https://n8n.torelo.net/webhook/analyze-document', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        documentId: documentId,
                        fileName: documentName,
                        timestamp: new Date().toISOString()
                    })
                });
                
                console.log('Response received:', response.status);
                
                if (!response.ok) {
                    const errorText = await response.text();
                    throw new Error(`HTTP error! status: ${response.status}, message: ${errorText}`);
                }
                
                const analysis = await response.json();
                console.log('Analysis result:', analysis);
                
                // Display results
                displayAnalysisResults(analysis);
                
            } catch (error) {
                console.error('Analysis error:', error);
                alert(currentLang === 'es' ? 
                    `Error al analizar el documento: ${error.message}` : 
                    `Error analyzing document: ${error.message}`);
            } finally {
                button.disabled = false;
                button.textContent = originalText;
            }
        }

        // Add this function to display results
        function displayAnalysisResults(analysis) {
            // Create a modal-style display
            const modal = document.createElement('div');
            modal.style.cssText = `
                position: fixed;
                top: 50%;
                left: 50%;
                transform: translate(-50%, -50%);
                background: white;
                padding: 30px;
                border-radius: 12px;
                box-shadow: 0 10px 40px rgba(0,0,0,0.3);
                max-width: 600px;
                max-height: 80vh;
                overflow-y: auto;
                z-index: 1000;
            `;
            
            const backdrop = document.createElement('div');
            backdrop.style.cssText = `
                position: fixed;
                top: 0;
                left: 0;
                width: 100%;
                height: 100%;
                background: rgba(0,0,0,0.5);
                z-index: 999;
            `;
            
            modal.innerHTML = `
                <h2 style="margin-bottom: 20px; color: #1f2937;">📊 ${currentLang === 'es' ? 'Análisis de Documento' : 'Document Analysis'}</h2>
                <h3 style="color: #4b5563; margin-bottom: 15px;">${analysis.fileName || 'Document'}</h3>
                
                <div style="margin-bottom: 20px;">
                    <h4 style="color: #6b7280; margin-bottom: 10px;">${currentLang === 'es' ? 'Información del Archivo:' : 'File Information:'}</h4>
                    <p><strong>ID:</strong> ${analysis.documentId}</p>
                    <p><strong>${currentLang === 'es' ? 'Tipo:' : 'Type:'}</strong> ${analysis.fileInfo?.type || 'Unknown'}</p>
                    <p><strong>${currentLang === 'es' ? 'Analizado:' : 'Analyzed:'}</strong> ${new Date(analysis.analysisTimestamp).toLocaleString()}</p>
                </div>
                
                ${analysis.aiInsights ? `
                    <div style="margin-bottom: 20px; padding: 15px; background: #f3f4f6; border-radius: 8px;">
                        <h4 style="color: #6b7280; margin-bottom: 10px;">🤖 AI Insights:</h4>
                        <pre style="white-space: pre-wrap; font-family: inherit;">${JSON.stringify(analysis.aiInsights, null, 2)}</pre>
                    </div>
                ` : ''}
                
                ${analysis.error ? `
                    <div style="color: #dc2626; padding: 10px; background: #fee2e2; border-radius: 8px;">
                        <strong>Error:</strong> ${analysis.error}
                    </div>
                ` : ''}
                
                <button onclick="this.parentElement.remove(); document.querySelector('.modal-backdrop').remove();" 
                        style="margin-top: 20px; padding: 10px 20px; background: #7c3aed; color: white; border: none; border-radius: 8px; cursor: pointer;">
                    ${currentLang === 'es' ? 'Cerrar' : 'Close'}
                </button>
            `;
            
            backdrop.className = 'modal-backdrop';
            backdrop.onclick = () => {
                modal.remove();
                backdrop.remove();
            };
            
            document.body.appendChild(backdrop);
            document.body.appendChild(modal);
        }
        
        // Handle form submission
        document.getElementById('searchForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const query = document.getElementById('searchInput').value.trim();
            
            if (!query) {
                document.getElementById('errorDiv').textContent = currentLang === 'es' ?
                    'Por favor ingresa un término de búsqueda' :
                    'Please enter a search term';
                document.getElementById('errorDiv').style.display = 'block';
                return;
            }
            
            await performSearch(query);
        });
        
        // Handle URL parameters for direct searches
        const urlParams = new URLSearchParams(window.location.search);
        const searchQuery = urlParams.get('q');
        if (searchQuery) {
            document.getElementById('searchInput').value = searchQuery;
            performSearch(searchQuery);
        }
        
        // Initialize translations
        updateTranslations();
    </script>
    <script src="nav.js" data-active="search"></script>
</body>
</html>
